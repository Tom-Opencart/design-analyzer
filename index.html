<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Analyzer</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --surface-color: #161b22;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-color: #58a6ff;
            --accent-hover: #79b8ff;
            --success-color: #3fb950;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; line-height: 1.5; }
        header { padding: 2rem; text-align: center; border-bottom: 1px solid var(--border-color); background: linear-gradient(180deg, rgba(88, 166, 255, 0.05) 0%, rgba(13, 17, 23, 0) 100%); }
        header h1 { font-size: 2.5rem; font-weight: 600; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        header p { color: var(--text-secondary); font-size: 1.1rem; }
        main { flex: 1; padding: 3rem 2rem; max-width: 1000px; width: 100%; margin: 0 auto; }
        .search-container { display: flex; gap: 1rem; margin-bottom: 2rem; }
        #urlInput { flex: 1; padding: 0.75rem 1rem; background-color: var(--surface-color); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary); font-size: 1rem; transition: border-color 0.2s; }
        #urlInput:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2); }
        #analyzeBtn { padding: 0.75rem 1.5rem; background-color: var(--accent-color); color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: background-color 0.2s; }
        #analyzeBtn:hover:not(:disabled) { background-color: var(--accent-hover); }
        #analyzeBtn:disabled { opacity: 0.6; cursor: not-allowed; }
        .loader-container { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 0; }
        .loader-container.active { display: flex; }
        .scanner { width: 100px; height: 100px; position: relative; margin-bottom: 2rem; }
        .scanner-ring { position: absolute; border: 2px solid transparent; border-radius: 50%; animation: rotate 2s linear infinite; }
        .scanner-ring:nth-child(1) { inset: 0; border-top-color: var(--accent-color); border-bottom-color: var(--accent-color); }
        .scanner-ring:nth-child(2) { inset: 15px; border-left-color: var(--success-color); border-right-color: var(--success-color); animation-duration: 1.5s; animation-direction: reverse; }
        .scanner-ring:nth-child(3) { inset: 30px; border-top-color: #d2a8ff; border-bottom-color: #d2a8ff; animation-duration: 1s; }
        .scanner-core { position: absolute; inset: 45px; background-color: var(--accent-color); border-radius: 50%; box-shadow: 0 0 15px var(--accent-color); animation: pulse 1.5s ease-in-out infinite; }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
        .loader-text { color: var(--text-secondary); font-size: 1rem; font-family: monospace; min-height: 1.5rem; text-align: center; }
        .result-container { display: none; background-color: var(--surface-color); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
        .result-container.active { display: block; }
        .result-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border-color); background-color: rgba(255, 255, 255, 0.02); }
        .result-header h3 { font-size: 1rem; font-weight: 600; }
        #downloadBtn { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background-color: var(--success-color); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: filter 0.2s; }
        #downloadBtn:hover { filter: brightness(1.1); }
        #markdownOutput { padding: 1.5rem; white-space: pre-wrap; word-break: break-word; font-family: "SF Mono", Monaco, Consolas, "Courier New", monospace; font-size: 0.85rem; line-height: 1.6; color: var(--text-secondary); max-height: 600px; overflow-y: auto; }
        footer { padding: 1.5rem; text-align: center; border-top: 1px solid var(--border-color); color: var(--text-secondary); font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <h1>Design Analyzer</h1>
        <p>Design token analyzer — paste a URL, get a design.md</p>
    </header>
    <main>
        <div class="search-container" id="urlMode">
            <input type="text" id="urlInput" placeholder="https://example.com">
            <button id="analyzeBtn">Analyze</button>
        </div>

        <div class="loader-container" id="loader">
            <div class="scanner">
                <div class="scanner-ring"></div>
                <div class="scanner-ring"></div>
                <div class="scanner-ring"></div>
                <div class="scanner-core"></div>
            </div>
            <div class="loader-text" id="loaderText">Initializing scanner...</div>
        </div>
        <div class="result-container" id="result">
            <div class="result-header">
                <h3 id="resultTitle">design.md</h3>
                <div style="display:flex;gap:0.5rem">
                    <button id="copyBtn" style="padding:0.5rem 1rem;background:transparent;color:var(--text-primary);border:1px solid var(--border-color);border-radius:6px;cursor:pointer;font-size:0.9rem;font-weight:500">Copy</button>
                    <button id="downloadBtn">Download design.md</button>
                </div>
            </div>
            <div id="markdownOutput"></div>
        </div>
    </main>
    <footer>Author: Tom</footer>

<script>
const urlInput = document.getElementById('urlInput');
const analyzeBtn = document.getElementById('analyzeBtn');
const loader = document.getElementById('loader');
const loaderText = document.getElementById('loaderText');
const resultDiv = document.getElementById('result');
const markdownOutput = document.getElementById('markdownOutput');
const downloadBtn = document.getElementById('downloadBtn');
let currentMarkdown = '';
let currentDomain = 'design';
let domainBase = 'design';

const loadingPhases = ["Initializing scanner...","Fetching page...","Extracting DOM...","Analyzing colors...","Analyzing typography...","Generating design.md..."];

async function fetchWithProxies(targetUrl) {
    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);
    const response = await fetch(proxyUrl);
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const html = await response.text();
    if (!html || html.length < 100) throw new Error('Empty response from server');
    return html;
}

analyzeBtn.addEventListener('click', async () => {
    let url = urlInput.value.trim();
    if (!url) return alert('Enter a URL');
    if (!url.startsWith('http://') && !url.startsWith('https://')) { url = 'https://' + url; urlInput.value = url; }
    try { new URL(url); } catch (e) { return alert('Invalid URL format.'); }
    loader.classList.add('active'); resultDiv.classList.remove('active'); analyzeBtn.disabled = true; urlInput.disabled = true;
    let pi = 0; loaderText.innerText = loadingPhases[pi];
    const iv = setInterval(() => { pi = (pi + 1) % loadingPhases.length; loaderText.innerText = loadingPhases[pi]; }, 1500);
    try {
        const html = await fetchWithProxies(url);
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const stylesheets = Array.from(doc.querySelectorAll('link[rel="stylesheet"]')).slice(0, 5);
        let cssText = '';
        for (const link of stylesheets) {
            let cssUrl = link.getAttribute('href');
            if (!cssUrl) continue;
            try { cssUrl = new URL(cssUrl, url).href; cssText += '\n' + await fetchWithProxies(cssUrl); } catch (e) {}
        }
        currentMarkdown = analyzeData(url, doc, html + "\n" + cssText);
    } catch (error) { currentMarkdown = generateFallbackMarkdown(url, error.message); }
    setTimeout(() => { clearInterval(iv); markdownOutput.textContent = currentMarkdown; loader.classList.remove('active'); resultDiv.classList.add('active'); analyzeBtn.disabled = false; urlInput.disabled = false; }, 2500);
});

function hexToRgb(hex) { hex = hex.replace('#', ''); if (hex.length === 3) hex = hex.split('').map(c => c + c).join(''); const n = parseInt(hex, 16); return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 }; }
function luminance(r, g, b) { const a = [r, g, b].map(v => { v /= 255; return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4); }); return 0.2126 * a[0] + 0.7152 * a[1] + 0.0722 * a[2]; }
function colorLabel(hex) {
    try {
        const { r, g, b } = hexToRgb(hex); const lum = luminance(r, g, b);
        if (hex === '#ffffff') return 'White'; if (hex === '#000000') return 'Black';
        if (lum < 0.02) return 'Near-Black'; if (lum > 0.95) return 'Near-White';
        const max = Math.max(r, g, b), min = Math.min(r, g, b); const s = max === 0 ? 0 : (max - min) / max;
        if (s < 0.06) return lum < 0.35 ? 'Dark Gray' : lum < 0.65 ? 'Gray' : 'Light Gray';
        let h; const d = max - min;
        if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6; else if (max === g) h = ((b - r) / d + 2) / 6; else h = ((r - g) / d + 4) / 6;
        h *= 360;
        if (h < 15 || h >= 345) return 'Red'; if (h < 45) return 'Orange'; if (h < 70) return 'Yellow'; if (h < 160) return 'Green';
        if (h < 200) return 'Cyan'; if (h < 260) return 'Blue'; if (h < 300) return 'Purple'; return 'Pink';
    } catch(e) { return 'Unknown'; }
}
function radiusToken(px) { if (px === 0) return 'none'; if (px <= 2) return 'xs'; if (px <= 4) return 'sm'; if (px <= 6) return 'md'; if (px <= 8) return 'lg'; if (px <= 12) return 'xl'; if (px <= 16) return 'xxl'; if (px <= 32) return 'xxxl'; return 'pill'; }
function spacingName(px) {
    const scale = [0, 2, 4, 6, 8, 10, 12, 16, 20, 24, 32, 40, 48, 56, 64, 80, 96, 120];
    const nearest = scale.reduce((a, b) => Math.abs(b - px) < Math.abs(a - px) ? b : a);
    const names = ['none', 'xxs', 'xs', 's', 'sm', 'm', 'md', 'lg', 'xl', 'xxl', 'xxxl', 'xxxxl', 'section-sm', 'section', 'section-lg', 'section-xl', 'section-xxl', 'section-xxxl'];
    const idx = scale.indexOf(nearest);
    if (Math.abs(nearest - px) <= 2) return names[idx];
    return 'spacing-' + px;
}
const ICON_FONTS = ['font awesome', 'fontawesome', 'material icons', 'glyphicon', 'ionicon', 'dashicon', 'genericon', 'octicons', 'elusive', 'foundation-icons', 'fa-', 'fi-', 'glyph', 'material-'];
function isIconFont(name) { const n = name.toLowerCase().replace(/["']/g, ''); return ICON_FONTS.some(f => n.includes(f)); }

function extractCSSProps(textData) {
    const rules = [];
    try {
        const blocks = textData.split('}');
        for (let i = 0; i < blocks.length && i < 10000; i++) {
            const block = blocks[i];
            const sep = block.indexOf('{');
            if (sep === -1) continue;
            const selector = block.substring(0, sep).trim().toLowerCase();
            const body = block.substring(sep + 1);
            if (!selector || !body) continue;
            const size = (body.match(/font-size\s*:\s*(\d+(?:\.\d+)?(?:px|rem|em))/i) || [])[1] || '';
            const weight = (body.match(/font-weight\s*:\s*(\d+|bold|normal)/i) || [])[1] || '';
            const lh = (body.match(/line-height\s*:\s*([\d.]+)/i) || [])[1] || '';
            const ls = (body.match(/letter-spacing\s*:\s*([-\d.]+(?:px|em|rem)?)/i) || [])[1] || '';
            if (size) {
                let spx = parseFloat(size);
                if (size.endsWith('rem')) spx *= 16; else if (size.endsWith('em')) spx *= 16;
                const wv = weight === 'bold' ? 700 : weight === 'normal' ? 400 : parseInt(weight) || 0;
                rules.push({ selector, sizePx: Math.round(spx), weight: wv, lineHeight: parseFloat(lh) || 0, letterSpacing: ls, body });
            }
        }
    } catch (e) {}
    return rules;
}

function analyzeData(url, doc, textData) {
    const title = doc.querySelector('title')?.textContent?.trim() || new URL(url).hostname;
    currentDomain = new URL(url).hostname.replace(/^www\./, '');
    domainBase = currentDomain.split('.')[0];
    document.getElementById('resultTitle').textContent = currentDomain + ' → design.md';

    // -- COLORS --
    const colorRegex = /#(?:[0-9a-fA-F]{3}){1,2}\b/g;
    const allHex = (textData.match(colorRegex) || []).map(c => { let h = c.toLowerCase(); if (h.length === 4) h = '#'+h[1]+h[1]+h[2]+h[2]+h[3]+h[3]; return h; }).filter(h => /^#[0-9a-f]{6}$/.test(h));
    const rawCounts = {}; allHex.forEach(c => rawCounts[c] = (rawCounts[c]||0)+1);
    function colorDist(a, b) { const ca = hexToRgb(a), cb = hexToRgb(b); return Math.abs(ca.r-cb.r) + Math.abs(ca.g-cb.g) + Math.abs(ca.b-cb.b); }
    const merged = {};
    Object.entries(rawCounts).sort((a,b)=>b[1]-a[1]).forEach(([hex, count]) => { let key = null; for (const k of Object.keys(merged)) { if (colorDist(hex, k) < 30) { key = k; break; } } if (key) merged[key] += count; else merged[hex] = count; });
    const finalColors = Object.entries(merged).sort((a,b)=>b[1]-a[1]);

    const bgSet = new Set(), txtSet = new Set(), brdSet = new Set(); let m;
    const bgR = /background(?:-color)?\s*:\s*#([0-9a-f]{6})/gi; while ((m = bgR.exec(textData)) !== null) bgSet.add('#'+m[1].toLowerCase());
    const txR = /(?:^|;)\s*color\s*:\s*#([0-9a-f]{6})/gim; while ((m = txR.exec(textData)) !== null) txtSet.add('#'+m[1].toLowerCase());
    const brR = /border[^:]*:\s*[^;]*#([0-9a-f]{6})/gi; while ((m = brR.exec(textData)) !== null) brdSet.add('#'+m[1].toLowerCase());

    const canvasHex = finalColors.length > 0 ? finalColors[0][0] : '#ffffff';
    const canvasLum = luminance(...Object.values(hexToRgb(canvasHex)));
    const isDark = canvasLum < 0.1;

    const accentColorsRaw = finalColors.filter(([hex]) => { const l = luminance(...Object.values(hexToRgb(hex))); return l > 0.08 && l < 0.92 && hex !== canvasHex && (bgSet.has(hex) || txtSet.has(hex) || brdSet.has(hex)); }).slice(0, 7);
    const seenLabels = new Set();
    const accentColors = accentColorsRaw.filter(([hex]) => !seenLabels.has(colorLabel(hex)) && seenLabels.add(colorLabel(hex)));
    const surfaceColors = finalColors.filter(([hex]) => { const l = luminance(...Object.values(hexToRgb(hex))); return hex === '#ffffff' || hex === '#000000' || (l > 0.85 && l < 0.99 && !txtSet.has(hex)) || (l > 0.01 && l < 0.12 && hex !== canvasHex); }).slice(0, 5);
    const textColors = finalColors.filter(([hex]) => { const l = luminance(...Object.values(hexToRgb(hex))); return (l > 0.85 || l < 0.15) && txtSet.has(hex); }).slice(0, 4);

    // -- FONTS (with icon font filtering) --
    const fontRegex = /font-family\s*:\s*([^;}]+)/g;
    const fontMatches = textData.match(fontRegex) || [];
    const fontCounts = {}; let mainFontStack = '';
    fontMatches.forEach(f => {
        const raw = f.replace(/font-family\s*:\s*/, '').replace(/!important/g, '').trim();
        const stack = raw.split(',').map(s => s.replace(/["']/g, '').trim()).filter(s => s && !s.startsWith('var('));
        if (stack.length > 0) {
            const first = stack[0];
            if (!isIconFont(first)) {
                fontCounts[first] = (fontCounts[first] || 0) + 1;
                if (stack.length > 1 && !mainFontStack) mainFontStack = stack.join(', ');
            }
        }
    });
    const topFonts = Object.entries(fontCounts).sort((a,b) => b[1]-a[1]).slice(0, 3);
    const mainFont = topFonts.length > 0 ? topFonts[0][0] : null;
    const secondaryFont = topFonts.length > 1 ? topFonts[1][0] : null;

    // -- TYPOGRAPHY from CSS rules --
    const cssRules = extractCSSProps(textData);
    const sizeGroups = {};
    cssRules.forEach(r => {
        if (r.sizePx < 10 || r.sizePx > 80) return;
        if (!sizeGroups[r.sizePx]) sizeGroups[r.sizePx] = { weights: {}, lh: [], ls: [], count: 0 };
        const g = sizeGroups[r.sizePx];
        g.count++;
        if (r.weight > 0) g.weights[r.weight] = (g.weights[r.weight] || 0) + 1;
        if (r.lineHeight > 0) g.lh.push(r.lineHeight);
        if (r.letterSpacing) g.ls.push(r.letterSpacing);
    });
    let topSizes = Object.entries(sizeGroups).map(([px, g]) => {
        const topW = Object.entries(g.weights).sort((a,b) => b[1]-a[1]);
        const avgLh = g.lh.length > 0 ? g.lh.sort((a,b)=>a-b)[Math.floor(g.lh.length/2)] : 0;
        const topLs = g.ls.length > 0 ? g.ls.sort((a,b) => g.ls.filter(x=>x===b).length - g.ls.filter(x=>x===a).length)[0] : '';
        return { px: +px, count: g.count, weight: topW.length > 0 ? +topW[0][0] : 0, lineHeight: Math.round(avgLh * 100) / 100, letterSpacing: topLs };
    }).filter(s => s.count >= 3).sort((a,b) => b.px - a.px).slice(0, 10);

    if (topSizes.length === 0) {
        topSizes = [
            { px: 48, count: 1, weight: 700, lineHeight: 1.0, letterSpacing: '' },
            { px: 36, count: 1, weight: 700, lineHeight: 1.1, letterSpacing: '' },
            { px: 28, count: 1, weight: 600, lineHeight: 1.2, letterSpacing: '' },
            { px: 24, count: 1, weight: 600, lineHeight: 1.2, letterSpacing: '' },
            { px: 20, count: 1, weight: 500, lineHeight: 1.3, letterSpacing: '' },
            { px: 18, count: 1, weight: 400, lineHeight: 1.4, letterSpacing: '' },
            { px: 16, count: 1, weight: 400, lineHeight: 1.5, letterSpacing: '' },
            { px: 14, count: 1, weight: 400, lineHeight: 1.5, letterSpacing: '' },
            { px: 12, count: 1, weight: 400, lineHeight: 1.4, letterSpacing: '' }
        ];
    }

    const allWeights = [...new Set(cssRules.map(r => r.weight).filter(w => w > 0))].sort((a,b) => a - b);

    // -- HEADINGS --
    const headings = [];
    doc.querySelectorAll('h1,h2,h3,h4,h5,h6').forEach(h => { headings.push({ tag: h.tagName.toLowerCase(), text: h.textContent.trim().replace(/\s+/g,' ').slice(0,60) }); });

    // -- SHAPES + SHADOWS + SPACING --
    const radRegex = /border-radius\s*:\s*([^;}]+)/g;
    const radM = textData.match(radRegex) || [];
    const radC = {};
    radM.forEach(r => { const px = parseFloat(r.replace(/border-radius\s*:\s*/,'').replace(/!important/g,'').trim()); if (!isNaN(px) && px >= 0) radC[px] = (radC[px]||0)+1; });
    const topRadii = (function() {
        const all = Object.entries(radC).map(([v,c])=>[+v,c]).sort((a,b)=>b[1]-a[1]);
        const seen = new Set();
        const deduped = [];
        all.forEach(([px, count]) => {
            const t = radiusToken(px);
            if (!seen.has(t)) { seen.add(t); deduped.push([px, count]); }
        });
        return deduped.slice(0, 6);
    })();

    const shRegex = /box-shadow\s*:\s*([^;}]+)/g;
    const shM = textData.match(shRegex) || [];
    const shadows = []; const seenSh = new Set();
    shM.forEach(s => { const v = s.replace(/box-shadow\s*:\s*/,'').trim(); if (v === 'none') return; const blur = parseFloat((v.match(/[-\d.]+px\s+[-\d.]+px\s+([-\d.]+px)/) || [,'0'])[1]); let level = 'Soft Lift'; if (blur > 24) level = 'Modal / Floating'; else if (blur > 12) level = 'Elevated'; else if (blur > 4) level = 'Soft Lift'; else level = 'Subtle'; if (!seenSh.has(level)) { seenSh.add(level); shadows.push({ val: v.slice(0,70), level, blur }); } });

    const spRegex = /(?:margin|padding)\s*:\s*([^;}]+)/g;
    const spM = textData.match(spRegex) || [];
    const spVals = new Set();
    const standardSp = [0,4,8,12,16,20,24,32,40,48,64,80,96,120];
    spM.forEach(s => { s.replace(/(?:margin|padding)\s*:\s*/,'').split(/\s+/).forEach(v => { const raw = parseFloat(v); if (isNaN(raw) || raw <= 0 || raw > 140) return; const px = standardSp.reduce((prev, curr) => Math.abs(curr - raw) < Math.abs(prev - raw) ? curr : prev); spVals.add(px); }); });
    const sortedSpacing = [...spVals].sort((a,b)=>a-b).filter(v=>v>0);

    const mqRegex = /@media[^{]*?(?:min|max)?-?width\s*[:(<>]=?\s*(\d+)px/gi;
    const mqM = textData.match(mqRegex) || [];
    const bps = [...new Set(mqM.map(m=>{const n=m.match(/(\d+)px/);return n?+n[1]:null;}))].filter(Boolean).sort((a,b)=>a-b).filter((bp, i, arr) => i === 0 || bp - arr[i-1] > 100);

    const wRegex = /max-width\s*:\s*(\d+)px/g;
    const wM = textData.match(wRegex) || [];
    const wC = {};
    wM.forEach(w => { const v=w.match(/(\d+)px/); if(v && +v[1] >= 1000 && +v[1] <= 1600) wC[v[1]+'px']=(wC[v[1]+'px']||0)+1; });
    const topWidths = Object.entries(wC).sort((a,b)=>b[1]-a[1]).slice(0,3);

    // -- DOM --
    const imgs = doc.querySelectorAll('img');
    const btns = doc.querySelectorAll('button,[role="button"],input[type="submit"],[class*="btn"]');
    const inputs = doc.querySelectorAll('input:not([type="hidden"]),textarea,select');
    const navEl = doc.querySelector('nav,[role="navigation"]');
    const footerEl = doc.querySelector('footer,[role="contentinfo"]');
    const headerEl = doc.querySelector('header');
    const links = doc.querySelectorAll('a[href]').length;
    const sliders = doc.querySelectorAll('[class*="slider"],[class*="carousel"],[class*="swiper"]');
    const modals = doc.querySelectorAll('[class*="modal"],[class*="popup"],[role="dialog"]');
    const forms = doc.querySelectorAll('form');
    const tabs = doc.querySelectorAll('[class*="tab"], [role="tablist"]');
    const breadcrumbs = doc.querySelectorAll('[class*="breadcrumb"], [aria-label*="breadcrumb"]');

    // -- Component style extraction (stricter selectors, height via padding fallback) --
    function extractCompStyles(patterns) {
        for (const pat of patterns) {
            const esc = pat.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp('(^|[^a-z-])' + esc + '($|[^a-z-])', 'i');
            const matches = cssRules.filter(r => regex.test(r.selector));
            if (matches.length >= 3) {
                const heights = matches.map(r => {
                    const h = r.body.match(/height\s*:\s*(\d+)px/i);
                    if (h) return +h[1];
                    const p = r.body.match(/padding\s*:\s*(\d+)px\s+(\d+)px/i);
                    if (p) return +p[1] * 2 + 16;

    md += '## Known Gaps\n\n';
    const gaps = [];
    gaps.push('- Hover, focus, and active states are not extracted — CSS pseudo-class analysis requires runtime evaluation.');
    gaps.push('- Animation and transition timings (carousel transitions, hover-reveal effects, accordion animations) are out of scope.');
    gaps.push('- Form validation states (error/success input variants) are not extracted from static CSS alone.');
    if (!modals.length) gaps.push('- No modal or overlay dialogs detected — popup/drawer components may exist but were not captured.');
    if (navEl && !doc.querySelector('[class*="mobile"],[class*="hamburger"],[class*="burger"]')) gaps.push('- Mobile navigation pattern (hamburger menu, drawer) not detected — responsive nav behavior may differ from static analysis.');
    const authenticatedPages = doc.querySelectorAll('[class*="account"],[class*="login"],[class*="dashboard"]');
    if (!authenticatedPages.length) gaps.push('- Authenticated pages (account, dashboard, checkout) were not analyzed — their component set may include additional patterns.');
    const darkModeToggle = doc.querySelectorAll('[class*="dark-mode"],[class*="theme-toggle"]');
    if (!darkModeToggle.length && !isDark) gaps.push('- Dark mode variant not captured — if the site has a dark theme toggle, its tokens are missing.');
    gaps.push('- The analysis is based on the top ' + cssRules.length + ' CSS rules from up to 5 stylesheets. Inline styles, shadow DOM, and dynamically injected CSS are not captured.');
    gaps.forEach(g => md += g + '\n');

    return md;
}

function generateFallbackMarkdown(url, errorMsg) {
    try { currentDomain = new URL(url).hostname.replace(/^www\./, ''); domainBase = currentDomain.split('.')[0]; } catch(e) {}
    document.getElementById('resultTitle').textContent = 'design.md — error';
    return '## Error\n\nFailed to load ' + url + '\n\n**Reason:** ' + errorMsg + '\n\nTry a different site.';
}

downloadBtn.addEventListener('click', () => {
    const blob = new Blob([currentMarkdown], { type: 'text/markdown;charset=utf-8' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = domainBase + '_design.md';
    document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(link.href);
});

document.getElementById('copyBtn').addEventListener('click', function() {
    navigator.clipboard.writeText(currentMarkdown).then(() => {
        this.textContent = 'Copied!'; this.style.borderColor = 'var(--success-color)'; this.style.color = 'var(--success-color)';
        setTimeout(() => { this.textContent = 'Copy'; this.style.borderColor = ''; this.style.color = ''; }, 2000);
    });
});
</script>
